<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Het Nieuwe Labelen - Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app-container">
        <!-- Background Animation Canvas -->
        <canvas id="bg-canvas"></canvas>

        <!-- Visualizer Content Goes Here -->
        <div id="text-container"></div>
        <div id="labels-container" class="hidden">
            <div class="label-card" id="label-algemeen">
                <div class="label-badge algemeen">Algemeen</div>
                <div class="label-desc">Informatie die iedereen mag zien. Geen beveiliging.</div>
            </div>
            <div class="label-card" id="label-intern">
                <div class="label-badge intern">Intern</div>
                <div class="label-desc">Onderling delen. Versleuteld.</div>
            </div>
            <div class="label-card" id="label-vertrouwelijk">
                <div class="label-badge vertrouwelijk">Vertrouwelijk</div>
                <div class="label-desc">Gevoelige zaken. Kleine groep. Geen AI.</div>
            </div>
            <div class="label-card" id="label-depv">
                <div class="label-badge depv">Dep.V.</div>
                <div class="label-desc">Grote schade. Strenge regels (inloggen).</div>
            </div>
            <div class="label-card" id="label-staatsgeheim">
                <div class="label-badge staatsgeheim">Staatsgeheim</div>
                <div class="label-desc">Zeer gevaarlijk. Veiligheid land.</div>
            </div>
        </div>
    </div>

    <div id="controls">
        <button id="play-btn">Play</button>
        <div id="time-display">0:00 / 4:39</div>
        <audio id="audio-player" src="audio/labeling-drz-explainer-intro.m4a"></audio>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
